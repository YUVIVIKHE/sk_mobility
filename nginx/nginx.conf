upstream sk_backend {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name skmobility.local;

    client_max_body_size 20M;

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API
    location /api/ {
        proxy_pass http://sk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://sk_backend/uploads/;
    }

    location /api-docs {
        proxy_pass http://sk_backend/api-docs;
    }

    location /health {
        proxy_pass http://sk_backend/health;
    }
}
